apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: headlamp-readonly
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["*"]
    verbs: ["get"]
  - apiGroups: ["authorization.k8s.io"]
    resources:
      - selfsubjectaccessreviews
      - selfsubjectrulesreviews
    verbs: ["create"]