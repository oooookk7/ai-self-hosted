apiVersion: v1
kind: Config
clusters:
- cluster:
    certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    server: https://kubernetes.default.svc
  name: main
contexts:
- context:
    cluster: main
    user: serviceaccount
  name: main
current-context: main
users:
- name: serviceaccount
  user:
    tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token