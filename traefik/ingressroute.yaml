apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: kube-system
spec:
  entryPoints:
    - websecure
  tls:
    secretName: ingress-tls
  routes:
    - match: Host(`proxy.k8sflow.space`)
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
