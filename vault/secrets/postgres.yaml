apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vault-postgres-secret
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-postgres
    kind: ClusterSecretStore

  target:
    name: vault-postgres-secret
    creationPolicy: Owner

  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: root
        property: user

    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: root
        property: password

    - secretKey: POSTGRES_DB
      remoteRef:
        key: root
        property: db

    # LiteLLM database user from Vault path: postgres/litellm
    - secretKey: POSTGRES_LITELLM_USER
      remoteRef:
        key: litellm
        property: user

    - secretKey: POSTGRES_LITELLM_PASSWORD
      remoteRef:
        key: litellm
        property: password

    - secretKey: POSTGRES_LITELLM_DB
      remoteRef:
        key: litellm
        property: db

    # RAG / pgvector database user from Vault path: postgres/pgvector
    - secretKey: POSTGRES_PGVECTOR_USER
      remoteRef:
        key: pgvector
        property: user

    - secretKey: POSTGRES_PGVECTOR_PASSWORD
      remoteRef:
        key: pgvector
        property: password

    - secretKey: POSTGRES_PGVECTOR_DB
      remoteRef:
        key: pgvector
        property: db
